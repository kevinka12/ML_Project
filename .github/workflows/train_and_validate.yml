name: train-and-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      - name: Run Dagger training pipeline
        run: go run dagger/main.go

      # === NEW: upload model from /tmp instead of repo ===
      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: /tmp/model_artifacts/model.pkl

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: /tmp/model_artifacts

  validate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Run model validator
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main
        with:
          model_password: ""
