name: train-and-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      # Run the Go Dagger pipeline directly.
      # The Go SDK will start the Dagger engine via Docker by itself.
      - name: Run Dagger training pipeline
        run: go run dagger/main.go

      # Upload the trained model for the validator.
      # Our pipeline writes: notebooks/artifacts/model.pkl
      # The validator will download this artifact as "model"
      # and expect to find: model/model.pkl
      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: notebooks/artifacts/model.pkl

      # Optional: upload entire artifacts directory for debugging/inspection
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: notebooks/artifacts

  validate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      # The validator action:
      # - automatically downloads the "model" artifact
      # - places it under ./model
      # - loads ./model/model.pkl
      # It only accepts one input: model_password.
      - name: Run model validator
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main
        with:
          model_password: ""
