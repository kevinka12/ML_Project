name: train-and-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      # Dagger GitHub action (must use single-line args!)
      - name: Run Dagger pipeline
        uses: dagger/dagger-for-github@v5
        with:
          version: "0.19.8"
          workdir: .
          args: "go run dagger/main.go"

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: notebooks/artifacts/model

      - name: Upload full artifacts bundle
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: notebooks/artifacts

  validate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: artifacts

      - name: Run model validator
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main
        with:
          model-path: artifacts/model
