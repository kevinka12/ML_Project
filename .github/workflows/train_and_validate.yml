name: train-and-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Dagger CLI
      - name: Install Dagger CLI
        run: |
          curl -L https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=0.19.8 sh
          sudo mv bin/dagger /usr/local/bin/dagger

      # Start Dagger engine
      - name: Start Dagger Engine
        run: dagger engine start &

      # Run your Dagger pipeline (Go code)
      - name: Run Dagger pipeline
        run: go run dagger/main.go

      # Upload model artifact for validator
      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: notebooks/artifacts/model

      # Upload the entire artifacts folder
      - name: Upload full artifacts bundle
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: notebooks/artifacts

  validate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: artifacts

      - name: Run model validator
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main
        with:
          model-path: artifacts/model
