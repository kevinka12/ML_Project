name: train-and-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Go
      # -------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      # -------------------------
      # Install Dagger CLI (working method)
      # -------------------------
      - name: Install Dagger CLI
        run: |
          curl -L https://github.com/dagger/dagger/releases/download/v0.19.8/dagger_linux_amd64.tar.gz -o dagger.tar.gz
          tar -xzf dagger.tar.gz
          sudo mv dagger /usr/local/bin/dagger
          dagger version

      # -------------------------
      # Start Dagger engine
      # -------------------------
      - name: Start Dagger engine
        run: dagger engine start &

      # -------------------------
      # Run your Go pipeline
      # -------------------------
      - name: Run Dagger pipeline
        run: go run dagger/main.go

      # -------------------------
      # Upload model
      # -------------------------
      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: notebooks/artifacts/model/model.pkl

      # Optional
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: notebooks/artifacts

  validate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      # Validator does NOT take model-path — only model_password
      - name: Validate model
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main
        with:
          model_password: ""
