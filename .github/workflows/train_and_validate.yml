name: train-and-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      # Install Dagger CLI (correct ZIP method)
      - name: Install Dagger CLI
        run: |
          curl -L https://github.com/dagger/dagger/releases/download/v0.19.8/dagger_v0.19.8_linux_amd64.zip -o dagger.zip
          unzip dagger.zip
          sudo mv dagger /usr/local/bin/dagger
          dagger version

      # Start Dagger engine
      - name: Start Dagger engine
        run: dagger engine start &

      # Run Dagger Go pipeline
      - name: Run Dagger pipeline
        run: go run dagger/main.go

      # Upload model
      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: notebooks/artifacts/model/model.pkl

      # Upload all artifacts (optional)
      - name: Upload artifacts folder
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: notebooks/artifacts

  validate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Run validator
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main
        with:
          model_password: ""
